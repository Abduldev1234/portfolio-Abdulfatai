<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ShopEase</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6f9;
}

header{
background:#007bff;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

button{
width:100%;
padding:8px;
margin-top:5px;
border:none;
background:#007bff;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

a{
color:white;
text-decoration:none;
}
.sign{
  margin-left: 1000px;
}
</style>
</head>

<body>

<header>
<h2>ShopEase</h2>
<div class="sign">
  <a href="./signup.html">log out</a>
</div>
<a href=  "./carts.html">
Cart (<span id="count">0</span>)
</a>

</header>

<div class="container">

<input id="search" placeholder="Search products...">

<div class="products" id="products"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDhwjHPjfz6zMMkHNyqv46k-xLapc-LKCw",
    authDomain: "simple-ecommerce-ea3fa.firebaseapp.com",
    projectId: "simple-ecommerce-ea3fa",
    storageBucket: "simple-ecommerce-ea3fa.firebasestorage.app",
    messagingSenderId: "592418636844",
    appId: "1:592418636844:web:2d07b376340ddfb0097d89"
  };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userId;
let allProducts = [];

// LOAD PRODUCTS
async function loadProducts(){

const snap = await getDocs(collection(db,"products"));

allProducts = snap.docs.map(doc => ({
id: doc.id,
...doc.data()
}));

render(allProducts);

}

// DISPLAY PRODUCTS
function render(items){

let box = document.getElementById("products");
box.innerHTML = "";

items.forEach(p=>{

box.innerHTML += `
<div class="card">

<!-- FIXED IMAGE HANDLING -->
<img src="${p.image}" 
onerror="this.src='https://via.placeholder.com/300'">

<h3>${p.name}</h3>
<p>$${p.price}</p>

<button onclick="addToCart('${p.id}')">
Add To Cart
</button>

<button onclick="viewProduct('${p.id}')">
View
</button>

</div>
`;

});

}

// VIEW PRODUCT PAGE
window.viewProduct = function(id){
location.href = "product.html?id=" + id;
}

// ADD TO CART
window.addToCart = async function(id){

if(!userId){
alert("Login first");
return;
}

const ref = doc(db,"carts",userId);
const snap = await getDoc(ref);

let cart = snap.exists()?snap.data().items:[];

let product = allProducts.find(p=>p.id===id);

let exist = cart.find(i=>i.id===id);

if(exist){
exist.quantity++;
}else{
cart.push({...product,quantity:1});
}

await setDoc(ref,{items:cart});

updateCart();

alert("Added to cart");

}

// CART COUNT
async function updateCart(){

if(!userId) return;

const snap = await getDoc(doc(db,"carts",userId));

let total = 0;

if(snap.exists()){
snap.data().items.forEach(i=>{
total += i.quantity;
});
}

document.getElementById("count").innerText = total;

}

// AUTH CHECK
onAuthStateChanged(auth,(user)=>{
if(user){
userId = user.uid;
updateCart();
}
});

// SEARCH
document.getElementById("search").addEventListener("input",(e)=>{

let value = e.target.value.toLowerCase();

let filtered = allProducts.filter(p=>
p.name.toLowerCase().includes(value)
);

render(filtered);

});

loadProducts();

</script>

</body>
</html>
